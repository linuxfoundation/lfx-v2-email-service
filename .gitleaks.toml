title = "gitleaks config"

[extend]
# useDefault will extend the base configuration with the default gitleaks config
useDefault = true

[allowlist]
    description = "Allowlisted files"
    paths = [
        # Exclude test files as they often contain dummy/fake data
        '''.*_test\.go$''',
        '''(go.mod|go.sum)$''',
        '''(.*?)gitleaks\.toml$'''
    ]
    # False positive in documentation: the cross-repo contract list in CLAUDE.md
    # (and similar docs) names the `lfx-v2-argocd` repo as the owner of deployed
    # values, image tags, IRSA annotations, and ExternalSecret wiring. The
    # `wiring: ` + backticked-token shape trips the default `generic-api-key`
    # rule even though it is plain prose referencing a public repo name, not a
    # credential. Scoped to the literal token so secret scanning stays active.
    regexes = [
        '''ExternalSecret wiring: `lfx-v2-argocd`''',
    ]
