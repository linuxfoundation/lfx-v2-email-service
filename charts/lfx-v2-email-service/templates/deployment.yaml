---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: {{ .Chart.Name }}
        app.kubernetes.io/name: {{ .Chart.Name }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default .Chart.Name }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          securityContext:
            allowPrivilegeEscalation: false
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NATS_URL
              value: {{ .Values.nats.url }}
            - name: LOG_LEVEL
              value: {{ .Values.app.logLevel }}
            - name: LOG_ADD_SOURCE
              value: {{ .Values.app.logAddSource | quote }}
            - name: EMAIL_ENABLED
              value: {{ .Values.app.email.enabled | quote }}
            - name: SMTP_HOST
              value: {{ .Values.app.email.smtpHost | quote }}
            - name: SMTP_PORT
              value: {{ .Values.app.email.smtpPort | quote }}
            - name: DEFAULT_SMTP_FROM
              value: {{ .Values.app.email.smtpFrom | quote }}
            {{- if .Values.app.email.smtpFromDisplayName }}
            - name: DEFAULT_SMTP_FROM_DISPLAY_NAME
              value: {{ .Values.app.email.smtpFromDisplayName | quote }}
            {{- end }}
            - name: SMTP_ALLOWED_FROM_DOMAINS
              value: {{ .Values.app.email.smtpAllowedFromDomains | quote }}
            - name: SMTP_ALLOWED_REPLY_TO_DOMAINS
              value: {{ .Values.app.email.smtpAllowedReplyToDomains | quote }}
            - name: SMTP_ALLOWED_RECIPIENT_DOMAINS
              value: {{ .Values.app.email.smtpAllowedRecipientDomains | quote }}
            {{- if .Values.app.email.smtpSecretName }}
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.email.smtpSecretName }}
                  key: smtp-username
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.email.smtpSecretName }}
                  key: smtp-password
                  optional: true
            {{- end }}
            - name: SES_EVENTING_ENABLED
              value: {{ .Values.app.ses.eventingEnabled | quote }}
            {{- if .Values.app.ses.engagementSecretName }}
            - name: SES_CONFIGURATION_SET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.ses.engagementSecretName }}
                  key: ses_configuration_set_name
                  optional: true
            - name: SES_ENGAGEMENT_SQS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.ses.engagementSecretName }}
                  key: sqs_queue_url
                  optional: true
            {{- end }}
            {{- with .Values.app.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- $otelServiceName := .Values.app.otel.serviceName | toString | trim }}
            {{- if ne $otelServiceName "" }}
            - name: OTEL_SERVICE_NAME
              value: {{ $otelServiceName | quote }}
            {{- end }}
            {{- $otelServiceVersion := .Values.app.otel.serviceVersion | toString | trim }}
            {{- if ne $otelServiceVersion "" }}
            - name: OTEL_SERVICE_VERSION
              value: {{ $otelServiceVersion | quote }}
            {{- end }}
            {{- $otelEndpoint := .Values.app.otel.endpoint | toString | trim }}
            {{- if ne $otelEndpoint "" }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $otelEndpoint | quote }}
            {{- end }}
            {{- $otelProtocol := .Values.app.otel.protocol | toString | trim }}
            {{- if ne $otelProtocol "" }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ $otelProtocol | quote }}
            {{- end }}
            {{- $otelInsecure := .Values.app.otel.insecure | toString | trim }}
            {{- if ne $otelInsecure "" }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: {{ $otelInsecure | quote }}
            {{- end }}
            {{- $otelTracesExporter := .Values.app.otel.tracesExporter | toString | trim }}
            {{- if ne $otelTracesExporter "" }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ $otelTracesExporter | quote }}
            {{- end }}
            {{- $otelTracesSampler := .Values.app.otel.tracesSampler | toString | trim }}
            {{- if ne $otelTracesSampler "" }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ $otelTracesSampler | quote }}
            {{- end }}
            {{- $otelTracesSamplerArg := .Values.app.otel.tracesSamplerArg | toString | trim }}
            {{- if ne $otelTracesSamplerArg "" }}
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ $otelTracesSamplerArg | quote }}
            {{- end }}
            {{- $otelMetricsExporter := .Values.app.otel.metricsExporter | toString | trim }}
            {{- if ne $otelMetricsExporter "" }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ $otelMetricsExporter | quote }}
            {{- end }}
            {{- $otelLogsExporter := .Values.app.otel.logsExporter | toString | trim }}
            {{- if ne $otelLogsExporter "" }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ $otelLogsExporter | quote }}
            {{- end }}
            {{- $otelPropagators := .Values.app.otel.propagators | toString | trim }}
            {{- if ne $otelPropagators "" }}
            - name: OTEL_PROPAGATORS
              value: {{ $otelPropagators | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: web
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /livez
              port: web
            failureThreshold: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: web
            failureThreshold: 1
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /readyz
              port: web
            failureThreshold: 30
            periodSeconds: 1
